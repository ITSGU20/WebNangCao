<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - La Fleur Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<style>
  /* FIX: prevent stat number overflow */
  .stat-info h3 {
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--espresso);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
  .stat-info h3.currency {
    font-size: 1.2rem;
  }
</style>
</head>
<body>
<div class="admin-layout" id="root"></div>
<div id="toast"></div>
<script src="data.js"></script>
<script src="admin.js"></script>
<script>
  if (!AdminLayout.guard()) {}

  function init() {
    const orders = DB.Orders.all();
    const users = DB.Users.all();
    const products = DB.Products.active();
    const totalRevenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.total||0), 0);
    const newOrders = orders.filter(o => o.status === 'new').length;
    const lowStock = products.filter(p => p.stock <= 5).length;

    document.getElementById('root').innerHTML = `
      ${AdminLayout.sidebar('dashboard')}
      <div class="admin-main">
        ${AdminLayout.topbar('📊 Dashboard')}
        <div class="admin-content">

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon si-caramel">💰</div>
              <div class="stat-info">
                <h3 class="currency" title="${DB.formatCurrency(totalRevenue)}">${DB.formatShort(totalRevenue)} đ</h3>
                <p>Tổng doanh thu</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon si-brown">🛒</div>
              <div class="stat-info"><h3>${orders.length}</h3><p>Tổng đơn hàng</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon si-blue">👥</div>
              <div class="stat-info"><h3>${users.length}</h3><p>Khách hàng</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon si-green">🎂</div>
              <div class="stat-info"><h3>${products.length}</h3><p>Sản phẩm đang bán</p></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon si-purple">⚡</div>
              <div class="stat-info"><h3>${newOrders}</h3><p>Đơn hàng mới</p></div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
            <!-- Recent Orders -->
            <div class="card">
              <div class="flex-between mb-3">
                <h3 style="font-family:var(--font-display);font-size:1.2rem;color:var(--chocolate)">Đơn hàng gần đây</h3>
                <a href="admin-orders.html" style="font-size:0.82rem;color:var(--caramel)">Xem tất cả →</a>
              </div>
              <div class="table-container">
                <table class="data-table">
                  <thead><tr><th>Mã ĐH</th><th>Khách hàng</th><th>Tổng</th><th>Trạng thái</th></tr></thead>
                  <tbody>
                    ${orders.length === 0
                      ? `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">Chưa có đơn hàng</td></tr>`
                      : [...orders].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5).map(o => {
                          const st = DB.statusLabel(o.status);
                          return `<tr>
                            <td><a href="admin-orders.html" style="color:var(--caramel)">#${String(o.id).slice(-6)}</a></td>
                            <td>${o.userName || '—'}</td>
                            <td style="white-space:nowrap">${DB.formatCurrency(o.total)}</td>
                            <td><span class="badge ${st.cls}">${st.text}</span></td>
                          </tr>`;
                        }).join('')}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Low Stock Alert -->
            <div class="card">
              <div class="flex-between mb-3">
                <h3 style="font-family:var(--font-display);font-size:1.2rem;color:var(--chocolate)">⚠️ Sắp hết hàng</h3>
                <a href="admin-inventory.html" style="font-size:0.82rem;color:var(--caramel)">Xem kho →</a>
              </div>
              ${products.filter(p => p.stock <= 10).sort((a,b) => a.stock - b.stock).slice(0,6).map(p => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:0.7rem 0;border-bottom:1px solid var(--border);font-size:0.86rem">
                  <span>${p.emoji || '🍰'} ${p.name}</span>
                  <span class="badge ${p.stock <= 0 ? 'badge-danger' : p.stock <= 3 ? 'badge-danger' : p.stock <= 5 ? 'badge-warning' : 'badge-info'}">${p.stock} còn lại</span>
                </div>`).join('') || '<p class="text-muted">Tất cả sản phẩm còn đủ hàng ✅</p>'}
            </div>
          </div>

          <!-- Quick Links -->
          <div class="card mt-3">
            <h3 style="font-family:var(--font-display);font-size:1.2rem;color:var(--chocolate);margin-bottom:1.2rem">Thao tác nhanh</h3>
            <div style="display:flex;gap:1rem;flex-wrap:wrap">
              <a href="admin-products.html" class="btn btn-caramel">🎂 Thêm sản phẩm</a>
              <a href="admin-import.html" class="btn btn-primary">📥 Nhập hàng mới</a>
              <a href="admin-orders.html" class="btn btn-outline">🛒 Quản lý đơn hàng</a>
              <a href="admin-users.html" class="btn btn-secondary">👥 Xem khách hàng</a>
              <a href="index.html" target="_blank" class="btn btn-secondary">🌐 Xem website</a>
            </div>
          </div>

        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
