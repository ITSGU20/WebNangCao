<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý người dùng – La Fleur Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="admin-body">
<script src="data.js"></script>
<script src="admin.js"></script>

<div class="admin-layout">
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main -->
  <div class="admin-main">
    <div id="topbar-container"></div>

    <div class="admin-content">
      <!-- Filter bar -->
      <div class="filter-bar card" style="margin-bottom:1.5rem">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center">
          <input type="text" id="searchInput" placeholder="Tìm tên, email, SĐT…" class="form-control" style="width:260px" oninput="renderTable()"/>
          <select id="roleFilter" class="form-control" style="width:160px" onchange="renderTable()">
            <option value="">Tất cả vai trò</option>
            <option value="customer">Khách hàng</option>
            <option value="admin">Admin</option>
          </select>
          <select id="statusFilter" class="form-control" style="width:160px" onchange="renderTable()">
            <option value="">Tất cả trạng thái</option>
            <option value="active">Hoạt động</option>
            <option value="locked">Đã khoá</option>
          </select>
          <button class="btn btn-primary" onclick="openAddModal()" style="margin-left:auto">+ Thêm người dùng</button>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <table class="admin-table" id="userTable">
          <thead>
            <tr>
              <th>Họ tên</th>
              <th>Email</th>
              <th>SĐT</th>
              <th>Vai trò</th>
              <th>Trạng thái</th>
              <th>Ngày tạo</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="paginationContainer" style="padding:1rem"></div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="userModal" onclick="closeModalOutside(event)">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="modalTitle">Thêm người dùng</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label class="form-label">Họ tên *</label>
        <input type="text" id="editName" class="form-control" placeholder="Nguyễn Văn A"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" id="editEmail" class="form-control" placeholder="user@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Số điện thoại</label>
        <input type="text" id="editPhone" class="form-control" placeholder="0901234567"/>
      </div>
      <div class="form-group">
        <label class="form-label">Địa chỉ</label>
        <input type="text" id="editAddress" class="form-control" placeholder="123 Đường ABC, Quận 1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Vai trò</label>
        <select id="editRole" class="form-control">
          <option value="customer">Khách hàng</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group" id="passwordGroup">
        <label class="form-label">Mật khẩu *</label>
        <input type="password" id="editPassword" class="form-control" placeholder="Tối thiểu 6 ký tự"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="saveUser()">Lưu</button>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="resetModal" onclick="closeResetOutside(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>Đặt lại mật khẩu</h3>
      <button class="modal-close" onclick="closeResetModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:1rem">Người dùng: <strong id="resetUserName"></strong></p>
      <div class="form-group">
        <label class="form-label">Mật khẩu mới *</label>
        <input type="password" id="newPassword" class="form-control" placeholder="Tối thiểu 6 ký tự"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeResetModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="confirmResetPassword()">Xác nhận</button>
    </div>
  </div>
</div>

<script>
  AdminLayout.guard();
  document.getElementById('sidebar-container').innerHTML = AdminLayout.sidebar('users');
  document.getElementById('topbar-container').innerHTML = AdminLayout.topbar('Quản lý người dùng');

  let currentPage = 1;
  const PAGE_SIZE = 10;
  let resetTargetId = null;

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const role = document.getElementById('roleFilter').value;
    const status = document.getElementById('statusFilter').value;
    const users = DB.Users.list();
    return users.filter(u => {
      const matchSearch = !search || u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search) || (u.phone||'').includes(search);
      const matchRole = !role || u.role === role;
      const matchStatus = !status || (status === 'active' ? u.active !== false : u.active === false);
      return matchSearch && matchRole && matchStatus;
    });
  }

  function renderTable() {
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const filtered = getFiltered();
    const paged = DB.paginate(filtered, currentPage, PAGE_SIZE);
    const tbody = document.getElementById('tableBody');
    if (paged.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Không có người dùng nào</td></tr>';
    } else {
      tbody.innerHTML = paged.items.map(u => `
        <tr>
          <td><strong>${u.name}</strong></td>
          <td>${u.email}</td>
          <td>${u.phone || '—'}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-primary' : 'badge-secondary'}">${u.role === 'admin' ? 'Admin' : 'Khách hàng'}</span></td>
          <td><span class="badge ${u.active !== false ? 'badge-success' : 'badge-danger'}">${u.active !== false ? 'Hoạt động' : 'Đã khoá'}</span></td>
          <td>${DB.formatDate(u.createdAt)}</td>
          <td>
            <div style="display:flex;gap:.5rem">
              <button class="btn btn-sm btn-outline" onclick="openEditModal(${u.id})">Sửa</button>
              <button class="btn btn-sm btn-outline" onclick="openResetModal(${u.id})">Đặt lại MK</button>
              <button class="btn btn-sm ${u.active !== false ? 'btn-danger' : 'btn-success'}" onclick="toggleLock(${u.id})">${u.active !== false ? 'Khoá' : 'Mở khoá'}</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    document.getElementById('paginationContainer').innerHTML = DB.renderPagination(paged, p => { currentPage = p; renderPage(); });
  }

  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Thêm người dùng';
    document.getElementById('editId').value = '';
    document.getElementById('editName').value = '';
    document.getElementById('editEmail').value = '';
    document.getElementById('editPhone').value = '';
    document.getElementById('editAddress').value = '';
    document.getElementById('editRole').value = 'customer';
    document.getElementById('editPassword').value = '';
    document.getElementById('passwordGroup').style.display = '';
    document.getElementById('userModal').classList.add('active');
  }

  function openEditModal(id) {
    const u = DB.Users.list().find(x => x.id === id);
    if (!u) return;
    document.getElementById('modalTitle').textContent = 'Sửa người dùng';
    document.getElementById('editId').value = u.id;
    document.getElementById('editName').value = u.name;
    document.getElementById('editEmail').value = u.email;
    document.getElementById('editPhone').value = u.phone || '';
    document.getElementById('editAddress').value = u.address || '';
    document.getElementById('editRole').value = u.role;
    document.getElementById('editPassword').value = '';
    document.getElementById('passwordGroup').style.display = 'none';
    document.getElementById('userModal').classList.add('active');
  }

  function closeModal() { document.getElementById('userModal').classList.remove('active'); }
  function closeModalOutside(e) { if (e.target.id === 'userModal') closeModal(); }

  function saveUser() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('editName').value.trim();
    const email = document.getElementById('editEmail').value.trim();
    const phone = document.getElementById('editPhone').value.trim();
    const address = document.getElementById('editAddress').value.trim();
    const role = document.getElementById('editRole').value;
    const password = document.getElementById('editPassword').value;

    if (!name || !email) return DB.showToast('Vui lòng điền đầy đủ thông tin bắt buộc', 'error');
    
    const users = DB.Users.list();
    if (!id && !password) return DB.showToast('Vui lòng nhập mật khẩu', 'error');
    if (!id && password.length < 6) return DB.showToast('Mật khẩu tối thiểu 6 ký tự', 'error');

    const emailExists = users.find(u => u.email === email && u.id !== parseInt(id));
    if (emailExists) return DB.showToast('Email đã được sử dụng', 'error');

    if (id) {
      const idx = users.findIndex(u => u.id === parseInt(id));
      if (idx >= 0) {
        users[idx] = { ...users[idx], name, email, phone, address, role };
        localStorage.setItem('lf_users', JSON.stringify(users));
        DB.showToast('Cập nhật người dùng thành công');
      }
    } else {
      const newUser = { id: Date.now(), name, email, phone, address, password, role, active: true, createdAt: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('lf_users', JSON.stringify(users));
      DB.showToast('Thêm người dùng thành công');
    }
    closeModal();
    renderPage();
  }

  function toggleLock(id) {
    const users = DB.Users.list();
    const idx = users.findIndex(u => u.id === id);
    if (idx < 0) return;
    const currentUser = JSON.parse(localStorage.getItem('lf_current_user') || 'null');
    if (currentUser && currentUser.id === id) return DB.showToast('Không thể khoá tài khoản đang đăng nhập', 'error');
    users[idx].active = users[idx].active === false ? true : false;
    localStorage.setItem('lf_users', JSON.stringify(users));
    DB.showToast(users[idx].active ? 'Đã mở khoá tài khoản' : 'Đã khoá tài khoản');
    renderPage();
  }

  function openResetModal(id) {
    const u = DB.Users.list().find(x => x.id === id);
    if (!u) return;
    resetTargetId = id;
    document.getElementById('resetUserName').textContent = u.name;
    document.getElementById('newPassword').value = '';
    document.getElementById('resetModal').classList.add('active');
  }
  function closeResetModal() { document.getElementById('resetModal').classList.remove('active'); resetTargetId = null; }
  function closeResetOutside(e) { if (e.target.id === 'resetModal') closeResetModal(); }

  function confirmResetPassword() {
    const pwd = document.getElementById('newPassword').value;
    if (pwd.length < 6) return DB.showToast('Mật khẩu tối thiểu 6 ký tự', 'error');
    const users = DB.Users.list();
    const idx = users.findIndex(u => u.id === resetTargetId);
    if (idx >= 0) {
      users[idx].password = pwd;
      localStorage.setItem('lf_users', JSON.stringify(users));
      DB.showToast('Đặt lại mật khẩu thành công');
    }
    closeResetModal();
  }

  renderPage();
</script>
</body>
</html>
