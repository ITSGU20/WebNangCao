<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài khoản của tôi - La Fleur Pâtisserie</title>
<link rel="stylesheet" href="style.css">
<style>
  .pw-wrap { position: relative; }
  .pw-wrap .form-control { padding-right: 2.8rem; }
  .pw-toggle {
    position: absolute; right: .75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--gray); font-size: 1rem; line-height: 1; padding: 0;
  }
  .pw-toggle:hover { color: var(--espresso); }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">La Fleur <span>Pâtisserie</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="index.html#products">Sản phẩm</a></li>
    <li><a href="search.html">Tìm kiếm</a></li>
  </ul>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<div style="max-width:820px;margin:3rem auto;padding:0 2rem">
  <div style="display:flex;gap:2rem;flex-wrap:wrap">

    <!-- Sidebar -->
    <div style="width:200px;flex-shrink:0">
      <div class="card card-sm" style="padding:1.5rem">
        <div style="text-align:center;margin-bottom:1.2rem">
          <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--caramel-light),var(--rose-light));margin:0 auto 0.8rem;display:flex;align-items:center;justify-content:center;font-size:2rem">👤</div>
          <div id="sidebar-name" style="font-weight:600;font-size:0.9rem;color:var(--espresso)"></div>
          <div id="sidebar-email" style="font-size:0.75rem;color:var(--gray);word-break:break-all"></div>
        </div>
        <nav style="display:flex;flex-direction:column;gap:0.3rem">
          <a href="profile.html" style="padding:0.6rem 0.8rem;border-radius:var(--radius-sm);background:var(--gray-light);color:var(--chocolate);font-size:0.85rem;font-weight:600">👤 Hồ sơ</a>
          <a href="orders.html" style="padding:0.6rem 0.8rem;border-radius:var(--radius-sm);color:var(--gray);font-size:0.85rem">📦 Đơn hàng</a>
          <a href="cart.html"   style="padding:0.6rem 0.8rem;border-radius:var(--radius-sm);color:var(--gray);font-size:0.85rem">🛒 Giỏ hàng</a>
          <button onclick="DB.Auth.logout();location.href='index.html'" style="padding:0.6rem 0.8rem;border-radius:var(--radius-sm);color:#C0392B;font-size:0.85rem;background:none;border:none;text-align:left;cursor:pointer;font-family:var(--font-body)">🚪 Đăng xuất</button>
        </nav>
      </div>
    </div>

    <!-- Main content -->
    <div style="flex:1;min-width:0">

      <!-- Profile form -->
      <div class="card">
        <h2 style="font-family:var(--font-display);font-size:1.5rem;color:var(--chocolate);margin-bottom:0.3rem">Thông tin cá nhân</h2>
        <p class="text-muted mb-4">Cập nhật thông tin tài khoản và địa chỉ giao hàng</p>

        <div id="alert-profile" style="display:none" class="alert"></div>

        <form id="profile-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Họ và tên *</label>
              <input type="text" class="form-control" id="p-name"/>
            </div>
            <div class="form-group">
              <label class="form-label">Số điện thoại *</label>
              <input type="tel" class="form-control" id="p-phone" maxlength="11"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" id="p-email"/>
          </div>

          <!-- Structured address -->
          <div class="form-group">
            <label class="form-label">Số nhà, tên đường *</label>
            <input type="text" class="form-control" id="p-street" placeholder="123 Đường Lê Lợi"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Quận / Huyện *</label>
              <select class="form-control" id="p-district">
                <option value="">-- Chọn quận --</option>
                <option>Quận 1</option><option>Quận 2</option><option>Quận 3</option>
                <option>Quận 4</option><option>Quận 5</option><option>Quận 6</option>
                <option>Quận 7</option><option>Quận 8</option><option>Quận 9</option>
                <option>Quận 10</option><option>Quận 11</option><option>Quận 12</option>
                <option>Bình Thạnh</option><option>Gò Vấp</option><option>Tân Bình</option>
                <option>Tân Phú</option><option>Phú Nhuận</option><option>Bình Chánh</option>
                <option>Nhà Bè</option><option>Củ Chi</option><option>Hóc Môn</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Tỉnh / Thành phố</label>
              <select class="form-control" id="p-city">
                <option value="TP.HCM">TP.HCM</option>
                <option value="Hà Nội">Hà Nội</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
                <option value="Cần Thơ">Cần Thơ</option>
                <option value="Hải Phòng">Hải Phòng</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
        </form>

        <hr style="border:none;border-top:1px solid var(--border);margin:2rem 0"/>

        <!-- Password change -->
        <h3 style="font-family:var(--font-display);font-size:1.2rem;color:var(--chocolate);margin-bottom:1.2rem">🔒 Đổi mật khẩu</h3>

        <div id="alert-password" style="display:none" class="alert"></div>

        <form id="password-form" novalidate>
          <div class="form-group">
            <label class="form-label">Mật khẩu hiện tại *</label>
            <div class="pw-wrap">
              <input type="password" class="form-control" id="old-pass" placeholder="••••••••"/>
              <button type="button" class="pw-toggle" onclick="togglePw('old-pass',this)">👁️</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Mật khẩu mới *</label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="new-pass" placeholder="Tối thiểu 6 ký tự"/>
                <button type="button" class="pw-toggle" onclick="togglePw('new-pass',this)">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Nhập lại mật khẩu mới *</label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="confirm-pass" placeholder="••••••••"/>
                <button type="button" class="pw-toggle" onclick="togglePw('confirm-pass',this)">👁️</button>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-outline">🔒 Đổi mật khẩu</button>
        </form>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>
<script src="data.js"></script>
<script>
  if (!DB.Auth.requireLogin()) {}

  // FIX: always read fresh user from storage (not a stale const)
  function currentUser() { return DB.Auth.current(); }

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁️';
  }

  // Parse address "street, district, city" back into fields
  function parseAddress(addr) {
    if (!addr) return { street: '', district: '', city: 'TP.HCM' };
    const parts = addr.split(',').map(s => s.trim());
    // Last part = city, second to last = district, rest = street
    if (parts.length >= 3) {
      return {
        street: parts.slice(0, parts.length - 2).join(', '),
        district: parts[parts.length - 2],
        city: parts[parts.length - 1]
      };
    } else if (parts.length === 2) {
      return { street: parts[0], district: '', city: parts[1] };
    }
    return { street: addr, district: '', city: 'TP.HCM' };
  }

  function loadProfile() {
    const user = currentUser();
    document.getElementById('sidebar-name').textContent = user.name;
    document.getElementById('sidebar-email').textContent = user.email;
    document.getElementById('p-name').value  = user.name;
    document.getElementById('p-phone').value = user.phone || '';
    document.getElementById('p-email').value = user.email;

    const { street, district, city } = parseAddress(user.address);
    document.getElementById('p-street').value = street;

    // Set district select
    const distSel = document.getElementById('p-district');
    for (let i = 0; i < distSel.options.length; i++) {
      if (distSel.options[i].text === district || distSel.options[i].value === district) {
        distSel.selectedIndex = i; break;
      }
    }

    // Set city select
    const citySel = document.getElementById('p-city');
    for (let i = 0; i < citySel.options.length; i++) {
      if (citySel.options[i].value === city) { citySel.selectedIndex = i; break; }
    }
  }

  function showAlert(alertId, msg, type) {
    const el = document.getElementById(alertId);
    el.textContent = msg;
    el.className = `alert alert-${type}`;
    el.style.display = 'flex';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  // ---- Profile form ----
  document.getElementById('profile-form').onsubmit = e => {
    e.preventDefault();
    const user   = currentUser();
    const name   = document.getElementById('p-name').value.trim();
    const phone  = document.getElementById('p-phone').value.trim();
    const email  = document.getElementById('p-email').value.trim();
    const street = document.getElementById('p-street').value.trim();
    const district = document.getElementById('p-district').value;
    const city   = document.getElementById('p-city').value;

    if (!name) { showAlert('alert-profile','Vui lòng nhập họ tên','danger'); return; }
    if (!/^0\d{9}$/.test(phone)) { showAlert('alert-profile','Số điện thoại không hợp lệ (cần 10 chữ số bắt đầu 0)','danger'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('alert-profile','Email không hợp lệ','danger'); return; }
    if (!street) { showAlert('alert-profile','Vui lòng nhập địa chỉ chi tiết','danger'); return; }
    if (!district) { showAlert('alert-profile','Vui lòng chọn quận/huyện','danger'); return; }

    // Check email uniqueness (excluding current user)
    const allUsers = DB.load('lf_users');
    const emailTaken = allUsers.find(u => u.email === email && u.id !== user.id);
    if (emailTaken) { showAlert('alert-profile','Email này đã được sử dụng bởi tài khoản khác','danger'); return; }

    const address = `${street}, ${district}, ${city}`;
    DB.Auth.updateProfile(user.id, { name, phone, email, address });

    // Update sidebar immediately
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-email').textContent = email;

    showAlert('alert-profile','✅ Cập nhật thông tin thành công!','success');
    DB.navbarUser(); // Refresh navbar
  };

  // ---- Password form ----
  document.getElementById('password-form').onsubmit = e => {
    e.preventDefault();
    // FIX: re-fetch fresh user to avoid stale password check
    const user       = currentUser();
    const oldPass    = document.getElementById('old-pass').value;
    const newPass    = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;

    if (!oldPass) { showAlert('alert-password','Vui lòng nhập mật khẩu hiện tại','danger'); return; }
    if (oldPass !== user.password) { showAlert('alert-password','Mật khẩu hiện tại không đúng','danger'); return; }
    if (newPass.length < 6) { showAlert('alert-password','Mật khẩu mới phải có ít nhất 6 ký tự','danger'); return; }
    if (newPass !== confirmPass) { showAlert('alert-password','Mật khẩu nhập lại không khớp','danger'); return; }
    if (newPass === oldPass) { showAlert('alert-password','Mật khẩu mới phải khác mật khẩu cũ','danger'); return; }

    DB.Auth.updateProfile(user.id, { password: newPass });
    showAlert('alert-password','🔒 Đổi mật khẩu thành công!','success');
    document.getElementById('password-form').reset();
  };

  DB.navbarUser();
  loadProfile();
</script>
</body>
</html>
