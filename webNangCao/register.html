<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký - La Fleur Pâtisserie</title>
<link rel="stylesheet" href="style.css">
<style>
  .pw-wrap { position: relative; }
  .pw-wrap .form-control { padding-right: 2.8rem; }
  .pw-toggle {
    position: absolute; right: .75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--gray); font-size: 1rem; line-height: 1; padding: 0;
  }
  .pw-toggle:hover { color: var(--espresso); }
  .field-error { font-size: .76rem; color: #C0392B; margin-top: .25rem; display: none; }
  .form-control.is-error { border-color: #E74C3C !important; box-shadow: 0 0 0 3px rgba(231,76,60,.12); }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-header">
      <a href="index.html" class="logo">La Fleur Pâtisserie</a>
      <p>Tạo tài khoản mới</p>
    </div>
    <div class="auth-body">
      <div id="error-msg" class="alert alert-danger" style="display:none"></div>
      <div id="success-msg" class="alert alert-success" style="display:none"></div>

      <form id="register-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Họ và tên *</label>
            <input type="text" class="form-control" id="name" placeholder="Nguyễn Văn A" autocomplete="name"/>
            <div class="field-error" id="err-name">Vui lòng nhập họ tên</div>
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại *</label>
            <input type="tel" class="form-control" id="phone" placeholder="0901234567" maxlength="11"/>
            <div class="field-error" id="err-phone">SĐT gồm 10 chữ số, bắt đầu bằng 0</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" class="form-control" id="email" placeholder="your@email.com"/>
          <div class="field-error" id="err-email">Email không hợp lệ hoặc đã được sử dụng</div>
        </div>

        <!-- Địa chỉ giao hàng — BẮT BUỘC (spec: phải có đủ thông tin giao hàng) -->
        <div class="form-group">
          <label class="form-label">Số nhà, tên đường *</label>
          <input type="text" class="form-control" id="street" placeholder="123 Đường Lê Lợi"/>
          <div class="field-error" id="err-street">Vui lòng nhập địa chỉ chi tiết</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Quận / Huyện *</label>
            <select class="form-control" id="district">
              <option value="">-- Chọn quận --</option>
              <option>Quận 1</option><option>Quận 2</option><option>Quận 3</option>
              <option>Quận 4</option><option>Quận 5</option><option>Quận 6</option>
              <option>Quận 7</option><option>Quận 8</option><option>Quận 9</option>
              <option>Quận 10</option><option>Quận 11</option><option>Quận 12</option>
              <option>Bình Thạnh</option><option>Gò Vấp</option><option>Tân Bình</option>
              <option>Tân Phú</option><option>Phú Nhuận</option><option>Bình Chánh</option>
              <option>Nhà Bè</option><option>Củ Chi</option><option>Hóc Môn</option>
            </select>
            <div class="field-error" id="err-district">Vui lòng chọn quận/huyện</div>
          </div>
          <div class="form-group">
            <label class="form-label">Tỉnh / Thành phố</label>
            <select class="form-control" id="city">
              <option value="TP.HCM">TP.HCM</option>
              <option value="Hà Nội">Hà Nội</option>
              <option value="Đà Nẵng">Đà Nẵng</option>
              <option value="Cần Thơ">Cần Thơ</option>
              <option value="Hải Phòng">Hải Phòng</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Mật khẩu *</label>
            <div class="pw-wrap">
              <input type="password" class="form-control" id="password" placeholder="Tối thiểu 6 ký tự"/>
              <button type="button" class="pw-toggle" onclick="togglePw('password',this)">👁️</button>
            </div>
            <div class="field-error" id="err-password">Mật khẩu phải có ít nhất 6 ký tự</div>
          </div>
          <div class="form-group">
            <label class="form-label">Nhập lại mật khẩu *</label>
            <div class="pw-wrap">
              <input type="password" class="form-control" id="confirm" placeholder="••••••••"/>
              <button type="button" class="pw-toggle" onclick="togglePw('confirm',this)">👁️</button>
            </div>
            <div class="field-error" id="err-confirm">Mật khẩu nhập lại không khớp</div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Đăng ký</button>
      </form>
    </div>
    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="data.js"></script>
<script>
  if (DB.Auth.isLoggedIn()) location.href = 'index.html';

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁️';
  }

  function setErr(id, errId, show, msg) {
    const el = document.getElementById(id);
    const errEl = document.getElementById(errId);
    if (show) {
      el.classList.add('is-error');
      if (msg) errEl.textContent = msg;
      errEl.style.display = 'block';
    } else {
      el.classList.remove('is-error');
      errEl.style.display = 'none';
    }
    return show;
  }

  // Clear errors on typing
  ['name','phone','email','street','district','password','confirm'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      el.classList.remove('is-error');
      const errEl = document.getElementById('err-' + id);
      if (errEl) errEl.style.display = 'none';
    });
  });

  document.getElementById('register-form').onsubmit = e => {
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const email    = document.getElementById('email').value.trim();
    const street   = document.getElementById('street').value.trim();
    const district = document.getElementById('district').value;
    const city     = document.getElementById('city').value;
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    document.getElementById('error-msg').style.display = 'none';

    let err = false;
    err = setErr('name',     'err-name',     !name,                          'Vui lòng nhập họ tên') || err;
    err = setErr('phone',    'err-phone',    !/^0\d{9}$/.test(phone),        'SĐT gồm 10 chữ số, bắt đầu bằng 0') || err;
    err = setErr('email',    'err-email',    !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email), 'Email không hợp lệ') || err;
    err = setErr('street',   'err-street',   !street,                        'Vui lòng nhập địa chỉ chi tiết') || err;
    err = setErr('district', 'err-district', !district,                      'Vui lòng chọn quận/huyện') || err;
    err = setErr('password', 'err-password', password.length < 6,            'Mật khẩu phải có ít nhất 6 ký tự') || err;
    err = setErr('confirm',  'err-confirm',  password !== confirm,           'Mật khẩu nhập lại không khớp') || err;
    if (err) return;

    const address = `${street}, ${district}, ${city}`;
    const result = DB.Auth.register({ name, phone, email, address, password });

    if (result.ok) {
      DB.Auth.login(email, password, false);
      document.getElementById('success-msg').textContent = '🎉 Đăng ký thành công! Đang chuyển hướng...';
      document.getElementById('success-msg').style.display = 'flex';
      setTimeout(() => location.href = 'index.html', 1200);
    } else {
      setErr('email', 'err-email', true, result.msg);
      const ge = document.getElementById('error-msg');
      ge.textContent = result.msg;
      ge.style.display = 'flex';
    }
  };
</script>
</body>
</html>
