<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý tồn kho – La Fleur Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .stock-bar-wrap { background: var(--border); border-radius: 100px; height: 8px; width: 120px; overflow: hidden; }
    .stock-bar { height: 100%; border-radius: 100px; transition: width .3s; }
    .low-stock-card { border-left: 4px solid #e74c3c; }
    
    /* CSS cho bảng báo cáo X-N-T */
    .report-table th, .report-table td { border-bottom: 1px solid var(--border); padding: 0.75rem; text-align: right; }
    .report-table th:first-child, .report-table td:first-child { text-align: left; }
    .report-table tbody tr:hover { background: var(--gray-light); }
  </style>
</head>
<body class="admin-body">
<script src="data.js"></script>
<script src="admin.js"></script>

<div class="admin-layout">
  <div id="sidebar-container"></div>
  <div class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem" id="statsRow"></div>

      <div class="card low-stock-card" id="lowStockAlert" style="margin-bottom:1.5rem;display:none">
        <h4 style="color:#e74c3c;margin-bottom:.75rem">⚠️ Sản phẩm sắp hết hàng</h4>
        <div id="lowStockList" style="display:flex;flex-wrap:wrap;gap:.5rem"></div>
      </div>

      <div class="filter-bar card" style="margin-bottom:1.5rem">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center">
          <input type="text" id="searchInput" class="form-control" placeholder="Tìm sản phẩm…" style="width:240px"/>
          <select id="catFilter" class="form-control" style="width:180px">
            <option value="">Tất cả danh mục</option>
          </select>
          <select id="stockFilter" class="form-control" style="width:180px">
            <option value="">Tất cả mức tồn kho</option>
            <option value="out">Hết hàng (0)</option>
            <option value="low">Sắp hết (≤ ngưỡng)</option>
            <option value="ok">Còn hàng (>10)</option>
          </select>
          <button class="btn btn-secondary" onclick="renderTable()">🔍 Tìm</button>

          <div style="display:flex;align-items:center;gap:.5rem;margin-left:auto">
            <label style="font-size:.82rem;color:var(--muted);white-space:nowrap">⚠️ Ngưỡng sắp hết:</label>
            <input type="number" id="thresholdInput" class="form-control" value="10" min="1" max="999"
                   style="width:75px;text-align:center" onchange="applyThreshold()" title="Số lượng được coi là sắp hết hàng"/>
            
            <button class="btn btn-primary" onclick="openReportModal()" style="margin-left: 0.5rem">📊 Báo cáo X-N-T</button>
          </div>
        </div>
      </div>

      <div class="card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Danh mục</th>
              <th>Tồn kho</th>
              <th>Mức tồn</th>
              <th>Giá trị tồn</th>
              <th>Cập nhật cuối</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="paginationContainer" style="padding:1rem"></div>
      </div>

    </div>
  </div>
</div>

<div class="modal-overlay" id="reportModal" onclick="closeReportOutside(event)">
  <div class="modal" style="max-width:850px">
    <div class="modal-header">
      <h3>Báo cáo Xuất - Nhập - Tồn</h3>
      <button class="modal-close" onclick="closeReportModal()">✕</button>
    </div>
    <div class="modal-body">
     <div style="display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 140px;">
          <label class="form-label" style="white-space: nowrap;">Từ ngày</label>
          <input type="date" id="reportFrom" class="form-control" style="width: 100%; box-sizing: border-box;"/>
        </div>
        <div style="flex: 1; min-width: 140px;">
          <label class="form-label" style="white-space: nowrap;">Đến ngày</label>
          <input type="date" id="reportTo" class="form-control" style="width: 100%; box-sizing: border-box;"/>
        </div>
        <div style="flex: 1.5; min-width: 160px;">
          <label class="form-label" style="white-space: nowrap;">Danh mục</label>
          <select id="reportCat" class="form-control" style="width: 100%; box-sizing: border-box;"></select>
        </div>
        <div style="flex: 2; min-width: 180px;">
          <label class="form-label" style="white-space: nowrap;">Tên sản phẩm</label>
          <input type="text" id="reportSearch" class="form-control" placeholder="Tên sản phẩm..." style="width: 100%; box-sizing: border-box;"/>
        </div>
        <div style="flex: none;">
          <button class="btn btn-primary" onclick="generateReport()" style="white-space: nowrap; height: 42px;">🔍 Lọc báo cáo</button>
        </div>
      </div>
      </div>
      
      <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px;">
        <table class="report-table" style="width: 100%; border-collapse: collapse;">
          <thead style="position: sticky; top: 0; background: #fafafa; z-index: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
            <tr>
              <th>Sản phẩm</th>
              <th>Tồn đầu kỳ</th>
              <th>Nhập trong kỳ</th>
              <th>Xuất trong kỳ</th>
              <th>Tồn cuối kỳ</th>
            </tr>
          </thead>
          <tbody id="reportTableBody"></tbody>
        </table>
      </div>
      <p style="font-size:0.8rem; color:var(--muted); margin-top:0.5rem">
        * Tồn cuối kỳ = Tồn tại ngày kết thúc. Tồn đầu kỳ = Tồn tại ngày bắt đầu.
      </p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="historyModal" onclick="closeHistoryOutside(event)">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3 id="historyTitle">Lịch sử tồn kho</h3>
      <button class="modal-close" onclick="closeHistoryModal()">✕</button>
    </div>
    <div class="modal-body" id="historyBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeHistoryModal()">Đóng</button>
    </div>
  </div>
</div>

<script>
  AdminLayout.guard();
  document.getElementById('sidebar-container').innerHTML = AdminLayout.sidebar('inventory');
  document.getElementById('topbar-container').innerHTML = AdminLayout.topbar('Tồn kho');

  let currentPage = 1;
  const PAGE_SIZE = 15;
  function getThreshold() { return parseInt(document.getElementById('thresholdInput')?.value) || 10; }
  function applyThreshold() { renderStats(); renderLowStockAlert(); renderPage(); }
  const HISTORY_KEY = 'lf_stock_history';

  // Hàm đọc dữ liệu lịch sử XNT do các trang khác (Đơn hàng, Nhập kho) tự động lưu vào
  function getHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }

  function populateCatFilter() {
    const cats = DB.Categories.list();
    const opts = '<option value="">Tất cả danh mục</option>' + cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    document.getElementById('catFilter').innerHTML = opts;
    document.getElementById('reportCat').innerHTML = opts;
  }

  function renderStats() {
    const products = DB.Products.list();
    const total = products.reduce((s, p) => s + (p.stock || 0), 0);
    const outOfStock = products.filter(p => !p.stock || p.stock <= 0).length;
    const lowStock = products.filter(p => p.stock > 0 && p.stock <= getThreshold()).length;
    const stockValue = products.reduce((s, p) => s + (p.stock || 0) * (p.costPrice || 0), 0);
    document.getElementById('statsRow').innerHTML = `
      <div class="admin-stat-card">
        <div class="stat-icon" style="background:#e8f4f8">📦</div>
        <div class="stat-info"><div class="stat-value">${total}</div><div class="stat-label">Tổng tồn kho</div></div>
      </div>
      <div class="admin-stat-card" style="cursor:pointer" onclick="filterStock('out')">
        <div class="stat-icon" style="background:#f8d7da">❌</div>
        <div class="stat-info"><div class="stat-value" style="color:#e74c3c">${outOfStock}</div><div class="stat-label">Hết hàng</div></div>
      </div>
      <div class="admin-stat-card" style="cursor:pointer" onclick="filterStock('low')">
        <div class="stat-icon" style="background:#fff3cd">⚠️</div>
        <div class="stat-info"><div class="stat-value" style="color:#f39c12">${lowStock}</div><div class="stat-label">Sắp hết hàng</div></div>
      </div>
      <div class="admin-stat-card">
        <div class="stat-icon" style="background:#d4edda">💰</div>
        <div class="stat-info"><div class="stat-value" style="font-size:1.1rem">${DB.formatCurrency(stockValue)}</div><div class="stat-label">Giá trị tồn kho</div></div>
      </div>
    `;
  }

  function renderLowStockAlert() {
    const products = DB.Products.list().filter(p => p.stock >= 0 && p.stock <= getThreshold());
    const el = document.getElementById('lowStockAlert');
    if (products.length === 0) { el.style.display = 'none'; return; }
    el.style.display = '';
    document.getElementById('lowStockList').innerHTML = products.map(p => `
      <span style="background:var(--bg);border:1px solid #e74c3c22;border-radius:8px;padding:.3rem .75rem;font-size:.85rem">
        ${p.emoji||''} ${p.name} <strong style="color:#e74c3c">(${p.stock})</strong>
      </span>`).join('');
  }

  function filterStock(v) { document.getElementById('stockFilter').value = v; renderTable(); }

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const catId = document.getElementById('catFilter').value;
    const stockF = document.getElementById('stockFilter').value;
    return DB.Products.list().filter(p => {
      const matchSearch = !search || p.name.toLowerCase().includes(search);
      const matchCat = !catId || String(p.catId) === catId;
      const s = p.stock || 0;
      const matchStock = !stockF || (stockF === 'out' ? s <= 0 : stockF === 'low' ? s > 0 && s <= getThreshold() : s > getThreshold());
      return matchSearch && matchCat && matchStock;
    }).sort((a, b) => (a.stock||0) - (b.stock||0));
  }

  function renderTable() { currentPage = 1; renderPage(); }

  function renderPage() {
    const cats = DB.Categories.list();
    const filtered = getFiltered();
    const history = getHistory(); // Lấy lịch sử để kiểm tra lần cập nhật cuối
    const paged = DB.paginate(filtered, currentPage, PAGE_SIZE);
    const maxStock = Math.max(...DB.Products.list().map(p => p.stock||0), 1);
    const tbody = document.getElementById('tableBody');
    
    if (paged.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Không có sản phẩm nào</td></tr>';
    } else {
      tbody.innerHTML = paged.items.map(p => {
        const cat = cats.find(c => c.id === p.catId);
        const s = p.stock || 0;
        const pct = Math.min(100, Math.round(s / maxStock * 100));
        const barColor = s <= 0 ? '#e74c3c' : s <= getThreshold() ? '#f39c12' : '#27ae60';
        const stockValue = s * (p.costPrice || 0);
        
        // Dò ngày thay đổi tồn kho gần nhất
        const pHist = history.find(h => h.productId === p.id);
        const lastUpdated = pHist ? DB.formatDate(pHist.at) : '<span style="color:var(--muted)">Chưa có dữ liệu</span>';

        return `
          <tr>
            <td><div style="display:flex;align-items:center;gap:.5rem"><span>${p.emoji||'🍰'}</span><strong>${p.name}</strong></div></td>
            <td>${cat ? cat.name : '—'}</td>
            <td><span style="font-size:1.1rem;font-weight:700;color:${barColor}">${s}</span></td>
            <td>
              <div class="stock-bar-wrap"><div class="stock-bar" style="width:${pct}%;background:${barColor}"></div></div>
            </td>
            <td style="font-weight:600">${stockValue > 0 ? DB.formatCurrency(stockValue) : '—'}</td>
            <td style="font-size:.85rem">${lastUpdated}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick="openHistoryModal(${p.id})">Lịch sử</button>
            </td>
          </tr>`;
      }).join('');
    }
    document.getElementById('paginationContainer').innerHTML = DB.renderPagination(paged, p => { currentPage = p; renderPage(); });
  }

  // ---- CÁC HÀM XỬ LÝ BÁO CÁO XUẤT NHẬP TỒN ----
  function openReportModal() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    const formatDateObj = (d) => {
        const tzOffset = (new Date()).getTimezoneOffset() * 60000;
        return (new Date(d - tzOffset)).toISOString().split('T')[0];
    };

    document.getElementById('reportFrom').value = formatDateObj(firstDay);
    document.getElementById('reportTo').value = formatDateObj(today);
    document.getElementById('reportCat').value = '';
    document.getElementById('reportSearch').value = '';
    
    document.getElementById('reportModal').classList.add('active');
    generateReport(); // Chạy lần đầu lúc mở
  }

  function closeReportModal() { document.getElementById('reportModal').classList.remove('active'); }
  function closeReportOutside(e) { if (e.target.id === 'reportModal') closeReportModal(); }

  function generateReport() {
    const fromStr = document.getElementById('reportFrom').value;
    const toStr = document.getElementById('reportTo').value;
    const catId = document.getElementById('reportCat').value;
    const search = document.getElementById('reportSearch').value.toLowerCase();

    const tFrom = fromStr ? new Date(fromStr + 'T00:00:00').getTime() : 0;
    const tTo = toStr ? new Date(toStr + 'T23:59:59').getTime() : Date.now();

    const products = DB.Products.list();
    const history = getHistory();
    const tbody = document.getElementById('reportTableBody');

    let reportRows = '';

    products.forEach(p => {
      if (catId && String(p.catId) !== catId) return;
      if (search && !p.name.toLowerCase().includes(search)) return;

      const pHistory = history.filter(h => h.productId === p.id);
      let currentStock = p.stock || 0;
      
      let deltaAfterToDate = 0;
      let totalIn = 0;
      let totalOut = 0;

      // Phân tích lịch sử: các nghiệp vụ Tăng (import, add) và Giảm (sale, order, subtract)
      pHistory.forEach(h => {
        let tLog = new Date(h.at).getTime();
        let delta = 0;
        
        if (['add', 'import'].includes(h.type)) delta = h.qty;
        else if (['subtract', 'sale', 'order'].includes(h.type)) delta = -h.qty;
        else if (h.type === 'set') delta = h.after - h.before; // Kiểm kê tự động điều chỉnh

        if (tLog > tTo) {
          deltaAfterToDate += delta;
        } else if (tLog >= tFrom && tLog <= tTo) {
          if (delta > 0) totalIn += delta;
          if (delta < 0) totalOut += Math.abs(delta);
        }
      });

      let endStock = currentStock - deltaAfterToDate;
      let startStock = endStock - totalIn + totalOut;

      if (startStock === 0 && endStock === 0 && totalIn === 0 && totalOut === 0) return;

      reportRows += `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:.5rem">
              <span>${p.emoji||'📦'}</span>
              <strong>${p.name}</strong>
            </div>
          </td>
          <td style="color:var(--muted)">${startStock}</td>
          <td style="color:#27ae60; font-weight:600">+${totalIn}</td>
          <td style="color:#e74c3c; font-weight:600">-${totalOut}</td>
          <td style="font-weight:700; font-size:1.1rem">${endStock}</td>
        </tr>
      `;
    });

    if (!reportRows) {
      reportRows = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem">Không có dữ liệu trong khoảng thời gian này</td></tr>';
    }

    tbody.innerHTML = reportRows;
  }
  // ----------------------------------------------

  function openHistoryModal(productId) {
    const p = DB.Products.list().find(x => x.id === productId);
    const history = getHistory().filter(h => h.productId === productId);
    document.getElementById('historyTitle').textContent = `Lịch sử: ${p ? p.name : 'Sản phẩm'}`;
    
    if (history.length === 0) {
      document.getElementById('historyBody').innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">Chưa có phát sinh nhập/xuất kho</p>';
    } else {
      // Dịch các mã nghiệp vụ thành tên gọi thân thiện
      const typeLabel = { 
        add: 'Nhập (Lệch kho)', 
        subtract: 'Xuất (Lệch kho)', 
        set: 'Kiểm kê',
        import: 'Nhập hàng',
        order: 'Đơn hàng (Bán)',
        sale: 'Xuất bán'
      };
      
      document.getElementById('historyBody').innerHTML = `
        <table class="admin-table">
          <thead><tr><th>Thời gian</th><th>Nghiệp vụ</th><th>Số lượng</th><th>Trước</th><th>Sau</th><th>Ghi chú</th></tr></thead>
          <tbody>
            ${history.slice(0, 50).map(h => {
              const displayType = typeLabel[h.type] || h.type;
              return `
              <tr>
                <td style="font-size:.85rem">${DB.formatDate(h.at)}</td>
                <td><span class="badge badge-secondary">${displayType}</span></td>
                <td style="font-weight:600">${h.qty}</td>
                <td>${h.before}</td>
                <td style="font-weight:600;color:${h.after > h.before ? '#27ae60' : '#e74c3c'}">${h.after}</td>
                <td style="color:var(--muted); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${h.note || ''}">${h.note || '—'}</td>
              </tr>`
            }).join('')}
          </tbody>
        </table>`;
    }
    document.getElementById('historyModal').classList.add('active');
  }
  function closeHistoryModal() { document.getElementById('historyModal').classList.remove('active'); }
  function closeHistoryOutside(e) { if (e.target.id === 'historyModal') closeHistoryModal(); }

  populateCatFilter();
  renderStats();
  renderLowStockAlert();
  renderPage(); // Load bảng lần đầu tiên
</script>
</body>
</html>
