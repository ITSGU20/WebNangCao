<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - La Fleur Pâtisserie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page" style="background:linear-gradient(135deg,var(--espresso),#3D1C02)">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-header" style="background:linear-gradient(135deg,#1A0900,#3D1C02)">
      <a href="index.html" class="logo" style="color:white">La Fleur <span style="color:var(--caramel-light)">Admin</span></a>
      <p>Đăng nhập quản trị viên</p>
    </div>
    <div class="auth-body">
      <div style="text-align:center;margin-bottom:1.5rem;font-size:3rem">🔐</div>
      <div id="error-msg" class="alert alert-danger" style="display:none"></div>
      <form id="admin-login-form">
        <div class="form-group">
          <label class="form-label">Email Admin</label>
          <input type="email" class="form-control" id="email" placeholder="admin@lafleur.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-3" style="background:var(--espresso)">Đăng nhập</button>
      </form>
      <div style="margin-top:1.2rem;padding:0.9rem;background:var(--gray-light);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--gray)">
        <strong>Demo:</strong> admin@lafleur.com / admin123
      </div>
    </div>
    <div class="auth-footer">
      <a href="index.html" style="color:var(--caramel)">← Về trang khách hàng</a>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="data.js"></script>
<script>
  if (DB.Auth.isAdmin()) location.href = 'admin-dashboard.html';

  document.getElementById('admin-login-form').onsubmit = (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const result = DB.Auth.login(email, password, true);
    if (result.ok) {
      DB.showToast('Đăng nhập thành công!', 'success');
      setTimeout(() => location.href = 'admin-dashboard.html', 500);
    } else {
      const err = document.getElementById('error-msg');
      err.textContent = result.msg;
      err.style.display = 'flex';
    }
  };
</script>
</body>
</html>
