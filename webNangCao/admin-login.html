<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - La Fleur Pâtisserie</title>
<link rel="stylesheet" href="style.css">
<style>
  .pw-wrap { position: relative; }
  .pw-wrap .form-control { padding-right: 2.8rem; }
  .pw-toggle {
    position: absolute; right: .75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,.5); font-size: 1rem; line-height: 1; padding: 0;
  }
  .pw-toggle:hover { color: white; }
</style>
</head>
<body>
<div class="auth-page" style="background:linear-gradient(135deg,var(--espresso),#3D1C02)">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-header" style="background:linear-gradient(135deg,#1A0900,#3D1C02)">
      <a href="index.html" class="logo" style="color:white">La Fleur <span style="color:var(--caramel-light)">Admin</span></a>
      <p>Đăng nhập quản trị viên</p>
    </div>

    <div class="auth-body">
      <div style="text-align:center;margin-bottom:1.5rem;font-size:3rem">🔐</div>

      <div id="error-msg" class="alert alert-danger" style="display:none"></div>

      <form id="admin-login-form" novalidate>
        <div class="form-group">
          <label class="form-label">Email Admin</label>
          <input type="email" class="form-control" id="email"
                 placeholder="admin@lafleur.com" autocomplete="email"
                 value="admin@lafleur.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="pw-wrap">
            <input type="password" class="form-control" id="password"
                   placeholder="••••••••" autocomplete="current-password"
                   value="admin123"/>
            <button type="button" class="pw-toggle" onclick="togglePw()">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-3"
                style="background:var(--espresso)">
          Đăng nhập
        </button>
      </form>

      <!-- Demo info + reset button -->
      <div style="margin-top:1.2rem;padding:0.9rem;background:var(--gray-light);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--gray)">
        <div style="margin-bottom:.5rem"><strong>Demo:</strong> admin@lafleur.com / admin123</div>
        <button onclick="resetData()" class="btn btn-sm btn-outline" style="width:100%;justify-content:center;font-size:.78rem">
          🔄 Reset dữ liệu demo (nếu không đăng nhập được)
        </button>
      </div>
    </div>

    <div class="auth-footer">
      <a href="index.html" style="color:var(--caramel)">← Về trang khách hàng</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="data.js"></script>
<script>
  // If already logged in as admin → go to dashboard
  if (DB.Auth.isAdmin()) location.href = 'admin-dashboard.html';

  function togglePw() {
    const el = document.getElementById('password');
    const btn = document.querySelector('.pw-toggle');
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁️';
  }

  // Reset ALL localStorage data → forces re-init on next load
  function resetData() {
    if (!confirm('Xoá toàn bộ dữ liệu demo và tải lại?\n(Mọi thay đổi sẽ mất)')) return;
    localStorage.clear();
    location.reload();
  }

  const errEl = document.getElementById('error-msg');

  document.getElementById('admin-login-form').onsubmit = e => {
    e.preventDefault();
    errEl.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errEl.textContent = 'Vui lòng nhập email và mật khẩu.';
      errEl.style.display = 'flex';
      return;
    }

    const result = DB.Auth.login(email, password, true);
    if (result.ok) {
      DB.showToast('Đăng nhập thành công!', 'success');
      setTimeout(() => location.href = 'admin-dashboard.html', 400);
    } else {
      errEl.textContent = result.msg;
      errEl.style.display = 'flex';
      document.getElementById('password').select();
    }
  };
</script>
</body>
</html>
