<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý sản phẩm – La Fleur Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .img-upload-area:hover { border-color: var(--caramel); background: var(--gray-light); }
    .img-upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .img-preview {
      width: 100%; height: 160px; object-fit: cover;
      border-radius: var(--radius-sm); display: block; margin-top: .5rem;
    }
    .product-img-thumb {
      width: 46px; height: 46px; border-radius: 8px; object-fit: cover;
      flex-shrink: 0; background: var(--gray-light);
      display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
      overflow: hidden;
    }
    .product-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body class="admin-body">
<script src="data.js"></script>
<script src="admin.js"></script>

<div class="admin-layout">
  <div id="sidebar-container"></div>
  <div class="admin-main">
    <div id="topbar-container"></div>
    <div class="admin-content">

      <div class="filter-bar card" style="margin-bottom:1.5rem">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center">
          <input type="text" id="searchInput" class="form-control" placeholder="Tìm tên, mã sản phẩm…" style="width:240px" oninput="renderTable()"/>
          <select id="catFilter" class="form-control" style="width:200px" onchange="renderTable()">
            <option value="">Tất cả danh mục</option>
          </select>
          <select id="statusFilter" class="form-control" style="width:160px" onchange="renderTable()">
            <option value="">Tất cả</option>
            <option value="active">Hiển thị</option>
            <option value="hidden">Ẩn</option>
          </select>
          <button class="btn btn-primary" onclick="openAddModal()" style="margin-left:auto">+ Thêm sản phẩm</button>
        </div>
      </div>

      <div class="card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Mã SP</th>
              <th>Danh mục</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="paginationContainer" style="padding:1rem"></div>
      </div>

    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal" onclick="closeModalOutside(event)">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h3 id="modalTitle">Thêm sản phẩm</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <input type="hidden" id="editImageData"/>

      <div class="form-group">
        <label class="form-label">Hình ảnh sản phẩm</label>
        <div class="img-upload-area" id="uploadArea">
          <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)"/>
          <div id="uploadPlaceholder">
            <div style="font-size:2rem;margin-bottom:.4rem">📷</div>
            <div style="font-size:.83rem;color:var(--muted)">Nhấn hoặc kéo thả ảnh vào đây</div>
            <div style="font-size:.75rem;color:var(--gray);margin-top:.2rem">JPG, PNG, WEBP • Tối đa 5MB</div>
          </div>
          <img id="imagePreview" class="img-preview" style="display:none" alt="preview"/>
        </div>
        <div style="display:flex;gap:.5rem;margin-top:.5rem">
          <button type="button" class="btn btn-sm btn-outline" id="removeImgBtn" onclick="removeImage()" style="display:none">✕ Xóa ảnh</button>
          <span style="font-size:.75rem;color:var(--muted);align-self:center" id="imgSizeInfo"></span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label class="form-label">Emoji (fallback khi không có ảnh)</label>
          <input type="text" id="editEmoji" class="form-control" placeholder="🎂" style="font-size:1.4rem;text-align:center"/>
        </div>
        <div class="form-group">
          <label class="form-label">Mã sản phẩm *</label>
          <input type="text" id="editCode" class="form-control" placeholder="BKSN001"/>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Tên sản phẩm *</label>
          <input type="text" id="editName" class="form-control" placeholder="Bánh kem sinh nhật hoa hồng"/>
        </div>
        <div class="form-group">
          <label class="form-label">Danh mục *</label>
          <select id="editCatId" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Trạng thái</label>
          <select id="editActive" class="form-control">
            <option value="true">Hiển thị</option>
            <option value="false">Ẩn</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Mô tả</label>
          <textarea id="editDesc" class="form-control" rows="3" placeholder="Mô tả sản phẩm…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="saveProduct()">Lưu</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal" onclick="closeDeleteOutside(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>Xác nhận xoá</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>Bạn có chắc muốn xoá sản phẩm <strong id="deleteName"></strong>?</p>
      <p id="deleteWarning" style="color:var(--rose);margin-top:.5rem;font-size:.88rem;display:none">
        ⚠️ Sản phẩm này đã có trong đơn hàng. Hệ thống sẽ <strong>ẩn</strong> thay vì xoá hẳn.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDeleteModal()">Huỷ</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Xoá / Ẩn</button>
    </div>
  </div>
</div>

<script>
  AdminLayout.guard();
  document.getElementById('sidebar-container').innerHTML = AdminLayout.sidebar('products');
  document.getElementById('topbar-container').innerHTML = AdminLayout.topbar('Quản lý sản phẩm');

  let currentPage = 1;
  const PAGE_SIZE = 10;
  let deleteTargetId = null;

  // ---- Image Upload + Compression ----
  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      DB.showToast('File quá lớn! Vui lòng chọn ảnh dưới 5MB', 'error');
      return;
    }
    compressImage(file, (base64, sizeKB) => {
      document.getElementById('editImageData').value = base64;
      document.getElementById('imagePreview').src = base64;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('uploadPlaceholder').style.display = 'none';
      document.getElementById('removeImgBtn').style.display = 'inline-flex';
      document.getElementById('imgSizeInfo').textContent = `Ảnh: ~${sizeKB}KB`;
    });
  }

  function compressImage(file, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        let w = img.width, h = img.height;
        const ratio = Math.min(MAX / w, MAX / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Try quality 0.75 first
        let base64 = canvas.toDataURL('image/jpeg', 0.75);
        // If still > 200KB encoded, reduce more
        if (base64.length > 270000) base64 = canvas.toDataURL('image/jpeg', 0.5);
        const sizeKB = Math.round(base64.length * 3 / 4 / 1024);
        callback(base64, sizeKB);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    document.getElementById('editImageData').value = '';
    document.getElementById('imagePreview').src = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadPlaceholder').style.display = 'block';
    document.getElementById('removeImgBtn').style.display = 'none';
    document.getElementById('imgSizeInfo').textContent = '';
    document.getElementById('imageInput').value = '';
  }

  function setImagePreview(imageData) {
    if (imageData) {
      document.getElementById('editImageData').value = imageData;
      document.getElementById('imagePreview').src = imageData;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('uploadPlaceholder').style.display = 'none';
      document.getElementById('removeImgBtn').style.display = 'inline-flex';
      const sizeKB = Math.round(imageData.length * 3 / 4 / 1024);
      document.getElementById('imgSizeInfo').textContent = `Ảnh: ~${sizeKB}KB`;
    } else {
      removeImage();
    }
  }

  // ---- Category Filters ----
  function populateCategoryFilters() {
    const cats = DB.Categories.list();
    const opts = cats.map(c => `<option value="${c.id}">${c.emoji||''} ${c.name}</option>`).join('');
    document.getElementById('catFilter').innerHTML = '<option value="">Tất cả danh mục</option>' + opts;
    document.getElementById('editCatId').innerHTML = '<option value="">-- Chọn danh mục --</option>' + opts;
  }

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const catId = document.getElementById('catFilter').value;
    const status = document.getElementById('statusFilter').value;
    return DB.Products.list().filter(p => {
      const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.code||'').toLowerCase().includes(search);
      const matchCat = !catId || String(p.catId) === catId;
      const matchStatus = !status || (status === 'active' ? p.active !== false : p.active === false);
      return matchSearch && matchCat && matchStatus;
    });
  }

  function renderTable() { currentPage = 1; renderPage(); }

  function renderPage() {
    const cats = DB.Categories.list();
    const filtered = getFiltered();
    const paged = DB.paginate(filtered, currentPage, PAGE_SIZE);
    const tbody = document.getElementById('tableBody');
    if (paged.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem">Không có sản phẩm nào</td></tr>';
    } else {
      tbody.innerHTML = paged.items.map(p => {
        const cat = cats.find(c => c.id === p.catId);
        const thumbHTML = p.image
          ? `<div class="product-img-thumb"><img src="${p.image}" alt="${p.name}"/></div>`
          : `<div class="product-img-thumb">${p.emoji || '🍰'}</div>`;
        return `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:.75rem">
                ${thumbHTML}
                <strong>${p.name}</strong>
              </div>
            </td>
            <td><code style="background:var(--bg);padding:.2rem .5rem;border-radius:4px">${p.code || '—'}</code></td>
            <td>${cat ? cat.name : '—'}</td>
            <td><span class="badge ${p.active !== false ? 'badge-success' : 'badge-danger'}">${p.active !== false ? 'Hiển thị' : 'Ẩn'}</span></td>
            <td>
              <div style="display:flex;gap:.5rem;flex-wrap:wrap">
                <button class="btn btn-sm btn-outline" onclick="openEditModal(${p.id})">Sửa</button>
                <button class="btn btn-sm ${p.active !== false ? 'btn-outline' : 'btn-success'}" onclick="toggleActive(${p.id})">${p.active !== false ? 'Ẩn' : 'Hiện'}</button>
                <button class="btn btn-sm btn-danger" onclick="openDeleteModal(${p.id})">Xoá</button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }
    document.getElementById('paginationContainer').innerHTML = DB.renderPagination(paged, p => { currentPage = p; renderPage(); });
  }

  function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Thêm sản phẩm';
    ['editId','editEmoji','editCode','editName','editDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('editCatId').value = '';
    document.getElementById('editActive').value = 'true';
    removeImage();
    document.getElementById('productModal').classList.add('active');
  }

  function openEditModal(id) {
    const p = DB.Products.list().find(x => x.id === id);
    if (!p) return;
    document.getElementById('modalTitle').textContent = 'Sửa sản phẩm';
    document.getElementById('editId').value = p.id;
    document.getElementById('editEmoji').value = p.emoji || '';
    document.getElementById('editCode').value = p.code || '';
    document.getElementById('editName').value = p.name;
    document.getElementById('editDesc').value = p.desc || '';
    document.getElementById('editCatId').value = p.catId;
    document.getElementById('editActive').value = String(p.active !== false);
    setImagePreview(p.image || '');
    document.getElementById('productModal').classList.add('active');
  }

  function closeModal() { document.getElementById('productModal').classList.remove('active'); }
  function closeModalOutside(e) { if (e.target.id === 'productModal') closeModal(); }

  function saveProduct() {
    const id = document.getElementById('editId').value;
    const emoji = document.getElementById('editEmoji').value.trim();
    const code = document.getElementById('editCode').value.trim();
    const name = document.getElementById('editName').value.trim();
    const catId = parseInt(document.getElementById('editCatId').value);
    const desc = document.getElementById('editDesc').value.trim();
    const active = document.getElementById('editActive').value === 'true';
    const image = document.getElementById('editImageData').value || '';

    if (!name) return DB.showToast('Vui lòng nhập tên sản phẩm', 'error');
    if (!catId) return DB.showToast('Vui lòng chọn danh mục', 'error');

    const products = DB.Products.list();
    if (id) {
      const idx = products.findIndex(p => p.id === parseInt(id));
      if (idx >= 0) products[idx] = { ...products[idx], emoji, code, name, catId, desc, active, image };
    } else {
      products.push({ id: Date.now(), emoji, code, name, catId, desc, active: true, image });
    }
    localStorage.setItem('lf_products', JSON.stringify(products));
    DB.showToast(id ? 'Cập nhật sản phẩm thành công' : 'Thêm sản phẩm thành công');
    closeModal();
    renderPage();
  }

  function toggleActive(id) {
    const products = DB.Products.list();
    const idx = products.findIndex(p => p.id === id);
    if (idx >= 0) {
      products[idx].active = products[idx].active === false ? true : false;
      localStorage.setItem('lf_products', JSON.stringify(products));
      DB.showToast(products[idx].active ? 'Đã hiện sản phẩm' : 'Đã ẩn sản phẩm');
      renderPage();
    }
  }

  function openDeleteModal(id) {
    const p = DB.Products.list().find(x => x.id === id);
    if (!p) return;
    deleteTargetId = id;
    document.getElementById('deleteName').textContent = p.name;
    const hasOrders = DB.Products.hasBeenOrdered(id);
    document.getElementById('deleteWarning').style.display = hasOrders ? 'block' : 'none';
    document.getElementById('confirmDeleteBtn').textContent = hasOrders ? 'Ẩn sản phẩm' : 'Xoá';
    document.getElementById('deleteModal').classList.add('active');
  }
  function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); deleteTargetId = null; }
  function closeDeleteOutside(e) { if (e.target.id === 'deleteModal') closeDeleteModal(); }

  function confirmDelete() {
    const hasOrders = DB.Products.hasBeenOrdered(deleteTargetId);
    if (hasOrders) {
      // Hide instead of delete (has order history)
      const products = DB.Products.list();
      const idx = products.findIndex(p => p.id === deleteTargetId);
      if (idx >= 0) { products[idx].active = false; localStorage.setItem('lf_products', JSON.stringify(products)); }
      DB.showToast('Đã ẩn sản phẩm (đã có trong đơn hàng)');
    } else {
      const products = DB.Products.list().filter(p => p.id !== deleteTargetId);
      localStorage.setItem('lf_products', JSON.stringify(products));
      DB.showToast('Đã xoá sản phẩm');
    }
    closeDeleteModal();
    renderPage();
  }

  populateCategoryFilters();
  renderPage();
</script>
</body>
</html>
