<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đơn hàng của tôi - La Fleur Pâtisserie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">La Fleur <span>Pâtisserie</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="index.html#products">Sản phẩm</a></li>
  </ul>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<div style="max-width:900px;margin:3rem auto;padding:0 2rem">
  <div style="display:flex;gap:2rem;flex-wrap:wrap">
    <!-- Sidebar -->
    <div style="width:200px;flex-shrink:0">
      <div class="card card-sm" style="padding:1.5rem">
        <div style="text-align:center;margin-bottom:1.2rem">
          <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--caramel-light),var(--rose-light));margin:0 auto 0.6rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem">👤</div>
          <div id="sb-name" style="font-weight:600;font-size:0.88rem;color:var(--espresso)"></div>
        </div>
        <nav style="display:flex;flex-direction:column;gap:0.3rem">
          <a href="profile.html" style="padding:0.55rem 0.8rem;border-radius:var(--radius-sm);color:var(--gray);font-size:0.85rem">👤 Hồ sơ</a>
          <a href="orders.html" style="padding:0.55rem 0.8rem;border-radius:var(--radius-sm);background:var(--gray-light);color:var(--chocolate);font-size:0.85rem;font-weight:600">📦 Đơn hàng</a>
          <a href="cart.html" style="padding:0.55rem 0.8rem;border-radius:var(--radius-sm);color:var(--gray);font-size:0.85rem">🛒 Giỏ hàng</a>
        </nav>
      </div>
    </div>

    <!-- Orders -->
    <div style="flex:1;min-width:0">
      <div class="flex-between mb-4">
        <h2 style="font-family:var(--font-display);font-size:1.6rem;color:var(--chocolate)">Đơn hàng của tôi</h2>
        <select class="form-control" id="filter-status" onchange="render()" style="width:auto;padding:0.4rem 1.5rem 0.4rem 0.8rem;font-size:0.83rem">
          <option value="">Tất cả</option>
          <option value="new">Mới đặt</option>
          <option value="processing">Đang xử lý</option>
          <option value="delivered">Đã giao</option>
          <option value="cancelled">Đã hủy</option>
        </select>
      </div>

      <div id="orders-list"></div>
    </div>
  </div>
</div>

<!-- Order detail modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Chi tiết đơn hàng</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="data.js"></script>
<script>
  if (!DB.Auth.requireLogin()) {}
  const user = DB.Auth.current();

  function init() {
    DB.navbarUser();
    document.getElementById('sb-name').textContent = user.name;
    render();
  }

  function render() {
    const statusFilter = document.getElementById('filter-status').value;
    let orders = DB.Orders.byUser(user.id);
    if (statusFilter) orders = orders.filter(o => o.status === statusFilter);
    // Sort: newest first
    orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const container = document.getElementById('orders-list');
    if (!orders.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>Chưa có đơn hàng</h3><p>Hãy mua sắm ngay!</p><a href="index.html" class="btn btn-caramel">🎂 Xem sản phẩm</a></div>';
      return;
    }

    container.innerHTML = orders.map(o => {
      const st = DB.statusLabel(o.status);
      // FIX: use DB.paymentLabel() to convert key to display text
      const payLabel = DB.paymentLabel(o.paymentMethod);
      return `
      <div class="card card-sm mb-3" style="cursor:pointer" onclick="viewOrder(${o.id})">
        <div class="flex-between mb-2">
          <span style="font-weight:700;color:var(--chocolate);font-size:0.95rem">Đơn #${String(o.id).slice(-6)}</span>
          <span class="badge ${st.cls}">${st.text}</span>
        </div>
        <div style="font-size:0.82rem;color:var(--gray);margin-bottom:0.5rem">
          📅 ${DB.formatDate(o.createdAt)} &nbsp;|&nbsp; 💳 ${payLabel} &nbsp;|&nbsp; 📍 ${o.address}
        </div>
        <div style="font-size:0.82rem;color:var(--espresso);margin-bottom:0.7rem">
          ${o.items.map(i => `${i.name} × ${i.qty}`).join(', ')}
        </div>
        <div class="flex-between">
          <span style="font-size:0.82rem;color:var(--gray)">${o.items.reduce((s,i)=>s+i.qty,0)} sản phẩm</span>
          <span style="font-weight:700;color:var(--chocolate)">${DB.formatCurrency(o.total)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function viewOrder(id) {
    const o = DB.Orders.get(id);
    if (!o) return;
    const st = DB.statusLabel(o.status);
    const payLabel = DB.paymentLabel(o.paymentMethod);
    document.getElementById('modal-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1.2rem;font-size:0.87rem">
        <div><span class="text-muted">Mã đơn:</span> <strong>#${String(o.id).slice(-6)}</strong></div>
        <div><span class="text-muted">Ngày đặt:</span> <strong>${DB.formatDate(o.createdAt)}</strong></div>
        <div><span class="text-muted">Trạng thái:</span> <span class="badge ${st.cls}">${st.text}</span></div>
        <div><span class="text-muted">Thanh toán:</span> <strong>${payLabel}</strong></div>
        <div style="grid-column:1/-1"><span class="text-muted">Địa chỉ:</span> <strong>${o.address}</strong></div>
      </div>
      <div class="table-container" style="border-radius:8px;border:1px solid var(--border)">
        <table class="data-table">
          <thead><tr><th>Sản phẩm</th><th>Số lượng</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
          <tbody>
            ${o.items.map(i => `<tr>
              <td>${i.name}</td>
              <td>${i.qty}</td>
              <td>${DB.formatCurrency(i.price)}</td>
              <td>${DB.formatCurrency(i.price*i.qty)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700;font-size:1rem;color:var(--chocolate)">
        <span>Tổng cộng</span><span>${DB.formatCurrency(o.total)}</span>
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
  }

  init();
</script>
</body>
</html>
